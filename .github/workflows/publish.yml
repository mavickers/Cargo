name: Publish to NuGet

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

# Serialize publish runs so concurrent releases can't race on the nuget push,
# tag, or GitHub Release creation.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x

      - name: Compute version (Nerdbank.GitVersioning)
        id: nbgv
        uses: dotnet/nbgv@705dad19ab067f12f4e9eeaa60812e01edef5d25 # v0.5.2

      - name: Build
        run: dotnet build Cargo.sln --configuration Release

      - name: Test
        run: dotnet test Cargo.sln --configuration Release --no-build --framework net8.0

      - name: Pack
        run: dotnet pack Cargo/Cargo.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.nbgv.outputs.SimpleVersion }}"
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; skipping."
          else
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --generate-notes \
              --latest
          fi
