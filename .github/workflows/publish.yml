name: Publish to NuGet

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x

      - name: Compute version (Nerdbank.GitVersioning)
        id: nbgv
        uses: dotnet/nbgv@master

      - name: Build
        run: dotnet build Cargo.sln --configuration Release

      - name: Test
        run: dotnet test Cargo.sln --configuration Release --no-build --framework net8.0

      - name: Pack
        run: dotnet pack Cargo/Cargo.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Tag published version
        run: |
          VERSION="${{ steps.nbgv.outputs.SimpleVersion }}"
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists; skipping."
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi
